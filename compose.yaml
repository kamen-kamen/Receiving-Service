services:
  postgres:
    image: 'postgres:16-alpine'
    environment:
      - 'POSTGRES_DB=mydatabase'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432:5432'

  redis:
    image: 'redis:latest'
    ports:
      - '6379:6379'

  zookeeper:
    image: 'zookeeper:3.9' # Официальный образ zookeepe
    ports:
      - '2181:2181'
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes



    # ... остальные настройки ...
  kafka:
    image: 'confluentinc/cp-kafka:7.6.0'
    ports:
      - '9092:9092'
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181          # ← убрал CFG_
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092  # ← убрал CFG_ и ALLOW_PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1        # ← добавь, иначе упадёт при старте
    depends_on:
      - zookeeper

  receiving-service:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/mydatabase
      - SPRING_DATASOURCE_USERNAME=myuser
      - SPRING_DATASOURCE_PASSWORD=secret
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_PROFILES_ACTIVE=dev

    depends_on:
      - postgres
      - kafka
