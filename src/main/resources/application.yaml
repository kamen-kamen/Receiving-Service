spring:
  application:
    name: receiving-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

  threads:
    virtual:
      enabled: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    table: flyway_schema_history


  mvc:
    problemdetails:
      enabled: true