spring:
  application:
    name: receiving-service

  threads:
    virtual:
      enabled: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history
#    baseline-on-migrate: true

  mvc:
    problemdetails:
      enabled: true